apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: sc-san-nvme
#    annotations:
#      storageclass.kubernetes.io/is-default-class: "true"
provisioner: csi.trident.netapp.io
parameters:
  backendType: "ontap-san"
# ext3, ext4 or xfs are possible fsType values, be aware that xfs has no automatic filesystem repair
  fsType: "ext4"
  sanType: "nvme"
allowVolumeExpansion: true