name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug files
        run: |
          pwd
          ls -la
          find . -maxdepth 3 -type d | sort

      - name: Copy generated files
        env:
          VARNISH_USER: ${{ secrets.VARNISH_USER }}
          VARNISH_HOST: ${{ secrets.VARNISH_HOST }}
          VARNISH_PATH: ${{ secrets.VARNISH_PATH }}
          VARNISH_SSH_KEY: ${{ secrets.VARNISH_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$VARNISH_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$VARNISH_HOST" >> ~/.ssh/known_hosts

          scp -i ~/.ssh/id_ed25519 -r generated/. \
            "${VARNISH_USER}@${VARNISH_HOST}:${VARNISH_PATH}"

